scriptings:
  - generic:
      name: "world-cup-widget"
      script_url: "https://raw.githubusercontent.com/FelixPang/rule_module_script/main/egern/scripts/WorldCup_Widget.js"
      timeout: 20
  # 演示进行中红色效果，可临时把 widget 的 script_name 改成 world-cup-widget-live-demo。
  - generic:
      name: "world-cup-widget-live-demo"
      script_url: "https://raw.githubusercontent.com/FelixPang/rule_module_script/main/egern/scripts/WorldCup_Widget_Live_Demo.js"
      timeout: 20

widgets:
  - name: "世界杯赛程"
    script_name: "world-cup-widget"
    # 默认使用 ESPN FIFA World Cup 赛程 / 比分来源，无需 API Key。
    # 脚本会按北京时间展示昨天、今天、明天。
    # 如果固定使用 ESPN，不需要配置 env。
